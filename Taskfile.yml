version: '3'

includes:
  claude:
    taskfile: ~/dev/Taskfile.yml
    flatten: true

vars:
  VERSION: 1.2.1
  BIN_DIR: bin
  BINARY_NAME: terraform-provider-dokku_v{{.VERSION}}
  # We dont' destroy resources in tests for now
  SKIP_DESTROY: true
  TEST_TIMEOUT: 20m
  GOOS:
    sh: go env GOOS
  GOARCH:
    sh: go env GOARCH

env:
  ASDF_GOLANG_MOD_VERSION_ENABLED: true
  SKIP_DESTROY: "{{.SKIP_DESTROY}}"

tasks:
  build:darwin-arm64:
    desc: Build the provider binary for macOS ARM64
    vars:
      BINARY: terraform-provider-dokku_v{{.VERSION}}
      BIN_PLATFORM_DIR: bin/darwin_arm64
    cmds:
      - mkdir -p {{.BIN_PLATFORM_DIR}}
      - CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o {{.BIN_PLATFORM_DIR}}/{{.BINARY}} .

  build:linux-arm64:
    desc: Build the provider binary for Linux ARM64
    vars:
      BINARY: terraform-provider-dokku_v{{.VERSION}}
      BIN_PLATFORM_DIR: bin/linux_arm64
    cmds:
      - mkdir -p {{.BIN_PLATFORM_DIR}}
      - CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o {{.BIN_PLATFORM_DIR}}/{{.BINARY}} .

  build:
    desc: Build the provider binary for both macOS ARM64 and Linux ARM64
    deps:
      - build:darwin-arm64
      - build:linux-arm64

  install:darwin-arm64:
    desc: Install the provider locally for macOS ARM64
    deps: [build:darwin-arm64]
    vars:
      BINARY: terraform-provider-dokku_v{{.VERSION}}
      BIN_PLATFORM_DIR: bin/darwin_arm64
      PLUGIN_DIR: ~/.terraform.d/plugins/registry.terraform.io/DimmKirr/dokku/{{.VERSION}}
    cmds:
      - mkdir -p {{.PLUGIN_DIR}}/darwin_arm64
      - cp {{.BIN_PLATFORM_DIR}}/{{.BINARY}} {{.PLUGIN_DIR}}/darwin_arm64/{{.BINARY}}
      - echo "Signing binary on macOS..."
      - codesign -s - -f {{.PLUGIN_DIR}}/darwin_arm64/{{.BINARY}} 2>/dev/null || true
      - echo "Binary signed successfully"

  install:linux-arm64:
    desc: Install the provider locally for Linux ARM64
    deps: [build:linux-arm64]
    vars:
      BINARY: terraform-provider-dokku_v{{.VERSION}}
      BIN_PLATFORM_DIR: bin/linux_arm64
      PLUGIN_DIR: ~/.terraform.d/plugins/registry.terraform.io/DimmKirr/dokku/{{.VERSION}}
    cmds:
      - mkdir -p {{.PLUGIN_DIR}}/linux_arm64
      - cp {{.BIN_PLATFORM_DIR}}/{{.BINARY}} {{.PLUGIN_DIR}}/linux_arm64/{{.BINARY}}

  install:
    desc: Install the provider locally for both macOS ARM64 and Linux ARM64
    deps:
      - install:darwin-arm64
      - install:linux-arm64
